<!DOCTYPE html> 
<html lang="pt-br"> 
<head> 
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>Axion Finance | Intelligent Precision</title> 
<link rel="stylesheet" href="style.css"> 
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet"> 
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"> 
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script> 
<script src="https://cdn.tailwindcss.com"></script> 
<script> 
tailwind.config = { 
theme: { 
extend: { 
colors: { 
primary: '#FF3B3B', 
dark: '#0D0D0D', 
card: '#161616', 
}, 
fontFamily: { 
inter: ['Inter', 'sans-serif'], 
} 
} 
} 
} 
</script> 
</head> 

<body class="bg-black text-white font-inter overflow-x-hidden"> 

<!-- App Shell --> 
<div id="app" class="flex flex-col md:flex-row min-h-screen"> 

<!-- Desktop Sidebar --> 
<nav class="hidden md:flex flex-col w-64 fixed h-full border-r border-white/10 bg-[#0D0D0D] z-50"> 
<div class="p-8"> 
<h1 class="text-2xl font-black italic text-[#FF3B3B] tracking-tighter">AXION</h1> 
<p class="text-[10px] uppercase tracking-[0.2em] text-gray-500 mt-1">Intelligent Precision</p> 
</div> 

<div class="flex-1 px-4 space-y-2" id="desktop-nav"> 
<button onclick="router.navigate('dashboard')" class="nav-link w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all"> 
<span class="material-icons-round">dashboard</span> Dashboard 
</button> 

<button onclick="router.navigate('portfolio')" class="nav-link w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all"> 
<span class="material-icons-round">account_balance_wallet</span> Portfólio 
</button> 

<button onclick="router.navigate('learning')" class="nav-link w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all"> 
<span class="material-icons-round">school</span> Aprender 
</button> 

<button onclick="router.navigate('settings')" class="nav-link w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all"> 
<span class="material-icons-round">settings</span> Ajustes 
</button> 
</div> 

<div class="p-6 border-t border-white/10"> 
<div class="flex items-center gap-3 p-3 rounded-xl bg-white/5 border border-white/5"> 
<div class="w-10 h-10 rounded-full bg-gradient-to-tr from-[#FF3B3B] to-red-900 flex items-center justify-center font-bold">AV</div> 
<div class="overflow-hidden"> 
<p class="text-sm font-bold truncate">Alex Vance</p> 
<p id="user-tier-label" class="text-[10px] text-gray-500 uppercase">Premium Tier</p> 
</div> 
</div> 
</div> 
</nav> 

<!-- Main Content Area --> 
<main id="main-content" class="flex-1 md:ml-64 pb-24 md:pb-0 min-h-screen bg-[#080808]"> 
<!-- As telas serão injetadas aqui via JS --> 
</main> 

<!-- Mobile Bottom Nav --> 
<nav class="md:hidden fixed bottom-0 left-0 w-full bg-[#0D0D0D]/90 backdrop-blur-xl border-t border-white/10 flex justify-around items-center h-20 px-4 z-50"> 

<button onclick="router.navigate('dashboard')" class="mobile-nav-link flex flex-col items-center gap-1"> 
<span class="material-icons-round">dashboard</span> 
<span class="text-[10px] font-bold uppercase">Home</span> 
</button> 

<button onclick="router.navigate('portfolio')" class="mobile-nav-link flex flex-col items-center gap-1"> 
<span class="material-icons-round">account_balance_wallet</span> 
<span class="text-[10px] font-bold uppercase">Assets</span> 
</button> 

<button onclick="router.navigate('learning')" class="mobile-nav-link flex flex-col items-center gap-1"> 
<span class="material-icons-round">school</span> 
<span class="text-[10px] font-bold uppercase">Learn</span> 
</button> 

<button onclick="router.navigate('settings')" class="mobile-nav-link flex flex-col items-center gap-1"> 
<span class="material-icons-round">settings</span> 
<span class="text-[10px] font-bold uppercase">Set</span> 
</button> 

</nav> 
</div> 

<script src="app.js"></script> 
</body> 
</html>
