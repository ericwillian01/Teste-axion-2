<script>
/* =========================
   AXION FINANCE ENGINE FINAL
========================= */

// STORAGE
const storage = {
    get: (key, fallback) => JSON.parse(localStorage.getItem(key)) || fallback,
    set: (key, value) => localStorage.setItem(key, JSON.stringify(value))
};

// STATE
let salary = storage.get("salary", 0);
let expenses = storage.get("expenses", []);
let investments = storage.get("investments", []);
let goals = storage.get("goals", []);

// HELPERS
const format = (v) => "$" + Number(v).toLocaleString("en-US", { minimumFractionDigits: 2 });

// CONTROL PANEL
const panel = document.createElement("div");
panel.className = "fixed right-4 bottom-24 z-50 glass-card p-4 rounded-xl text-xs space-y-2";
panel.innerHTML = `
<input id="salaryInput" placeholder="Salary" type="number" class="w-full bg-black/40 p-2 rounded"/>
<input id="expenseName" placeholder="Expense name" class="w-full bg-black/40 p-2 rounded"/>
<input id="expenseValue" placeholder="Value" type="number" class="w-full bg-black/40 p-2 rounded"/>
<input id="expenseCategory" placeholder="Category" class="w-full bg-black/40 p-2 rounded"/>
<button id="addExpense" class="w-full bg-red-500/80 p-2 rounded">Add Expense</button>

<input id="investValue" placeholder="Invest" type="number" class="w-full bg-black/40 p-2 rounded"/>
<button id="addInvest" class="w-full bg-blue-500/80 p-2 rounded">Add Invest</button>

<input id="goalName" placeholder="Goal" class="w-full bg-black/40 p-2 rounded"/>
<input id="goalValue" placeholder="Target" type="number" class="w-full bg-black/40 p-2 rounded"/>
<button id="addGoal" class="w-full bg-green-500/80 p-2 rounded">Add Goal</button>
`;
document.body.appendChild(panel);

// CALC
function calc() {
    const totalExpenses = expenses.reduce((a, b) => a + b.value, 0);
    const totalInvest = investments.reduce((a, b) => a + b.value, 0);
    const balance = salary - totalExpenses;
    return { totalExpenses, totalInvest, balance };
}

// SCORE
function calcScore(balance, totalExpenses) {
    if (salary === 0) return 0;

    const savingsRate = (balance / salary) * 100;
    let score = 50 + savingsRate;

    if (totalExpenses > salary) score -= 30;
    if (balance < 0) score -= 40;

    return Math.max(0, Math.min(100, Math.round(score)));
}

// INSIGHTS
function generateInsights(balance, totalExpenses) {
    if (balance < 0) return "⚠️ You are overspending.";
    if (balance > salary * 0.4) return "🚀 Strong savings detected.";
    if (totalExpenses > salary * 0.7) return "📉 Expenses too high.";
    return "✅ Healthy financial behavior.";
}

// RENDER
function render() {
    const { totalExpenses, totalInvest, balance } = calc();
    const score = calcScore(balance, totalExpenses);

    // BALANCE
    document.querySelector(".font-metric-xl").innerText = format(balance);

    // INCOME
    document.getElementById("incomeValue").innerText = format(salary);

    // EXPENSES
    document.getElementById("expenseValueUI").innerText = format(totalExpenses);

    // SCORE
    document.querySelector(".text-4xl").innerText = score;

    const label = document.querySelector(".text-[10px]");
    if (score > 70) label.innerText = "Safe Zone";
    else if (score > 40) label.innerText = "Medium Risk";
    else label.innerText = "Danger Zone";

    // INSIGHT
    document.getElementById("insightText").innerText =
        generateInsights(balance, totalExpenses);

    // PROJECTION
    const projection = balance * 6;
    document.querySelector(".text-sm.text-on-surface-variant").innerText =
        "Projected: " + format(projection);

    // VISUAL FEEDBACK
    if (balance < 0) {
        document.body.style.border = "2px solid red";
    } else {
        document.body.style.border = "none";
    }

    // SAVE
    storage.set("salary", salary);
    storage.set("expenses", expenses);
    storage.set("investments", investments);
    storage.set("goals", goals);
}

// EVENTS

document.getElementById("salaryInput").addEventListener("change", (e) => {
    salary = Number(e.target.value);
    render();
});

document.getElementById("addExpense").onclick = () => {
    const name = document.getElementById("expenseName").value;
    const value = Number(document.getElementById("expenseValue").value);
    const category = document.getElementById("expenseCategory").value;

    if (!name || !value) return;

    expenses.push({ name, value, category });

    document.getElementById("expenseName").value = "";
    document.getElementById("expenseValue").value = "";
    document.getElementById("expenseCategory").value = "";

    render();
};

document.getElementById("addInvest").onclick = () => {
    const value = Number(document.getElementById("investValue").value);
    if (!value) return;

    investments.push({ value });

    document.getElementById("investValue").value = "";

    render();
};

document.getElementById("addGoal").onclick = () => {
    const name = document.getElementById("goalName").value;
    const target = Number(document.getElementById("goalValue").value);

    if (!name || !target) return;

    goals.push({ name, target, current: 0 });

    document.getElementById("goalName").value = "";
    document.getElementById("goalValue").value = "";

    render();
};

// INIT
render();
</script>
